<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ICI — Immigrant Climate Index</title>
    <!-- GitHub Pages serves this for any unknown path (e.g. a reload on
         /team). It re-encodes the path into a query string and redirects to
         the SPA root, where index.html's inline script decodes it back and
         React Router takes over. Standard "spa-github-pages" trick. -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
